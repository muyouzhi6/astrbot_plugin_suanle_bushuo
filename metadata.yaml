repo: https://github.com/muyouzhi6/astrbot_plugin_suanle_bushuo
author: 木有知
version: v0.1.0
support_platforms:
  - aiocqhttp
  - qq_official
  - telegram
  - discord
  - slack
  - kook
  - lark
  - satori
  - misskey
  - line
astrbot_version: ">=4.24.0,<5.0.0"
